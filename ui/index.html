<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#1a1a1a" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png" />
    <link rel="apple-touch-icon" href="/icons/nexus-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>Nexus</title>
  </head>
  <body>
    <div id="root">
      <div id="nexus-fallback" style="position:fixed;inset:0;z-index:99999;display:grid;place-items:center;overflow:hidden;background:radial-gradient(ellipse at center,#1a1230 0%,#0a0612 60%,#000 100%)">
        <div style="position:absolute;inset:-10%;background:radial-gradient(circle at 30% 40%,rgba(120,80,220,.32),transparent 60%),radial-gradient(circle at 72% 62%,rgba(80,170,230,.24),transparent 58%),radial-gradient(circle at 50% 80%,rgba(255,100,180,.16),transparent 55%);filter:blur(28px);animation:nxfb-pulse 4.2s ease-in-out infinite alternate"></div>
        <div style="width:min(58vmin,580px);aspect-ratio:1;border-radius:50%;border:1px solid rgba(180,140,255,.2);box-shadow:0 0 80px 12px rgba(160,100,255,.18),inset 0 0 90px rgba(100,200,255,.1);animation:nxfb-ring 2.2s cubic-bezier(.2,.7,.2,1) infinite"></div>
        <svg style="position:relative;width:72px;height:72px;filter:drop-shadow(0 12px 60px rgba(120,60,220,.42));animation:nxfb-logo 1.4s cubic-bezier(.2,.85,.2,1) both" viewBox="0 0 32 32" fill="none" stroke="#b4a0ff" stroke-width="1.6">
          <ellipse cx="16" cy="16" rx="14" ry="5.5"/>
          <ellipse cx="16" cy="16" rx="14" ry="5.5" transform="rotate(60 16 16)"/>
          <ellipse cx="16" cy="16" rx="14" ry="5.5" transform="rotate(120 16 16)"/>
          <circle cx="16" cy="16" r="3.6" fill="#b4a0ff" stroke="none"/>
        </svg>
        <p style="position:absolute;bottom:6vh;font:11px -apple-system,BlinkMacSystemFont,Segoe UI,system-ui,sans-serif;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.28);animation:nxfb-fade .8s ease-out 1.1s both">Starting Nexus…</p>
      </div>
      <style>
        @keyframes nxfb-pulse{from{opacity:.55;transform:scale(1) rotate(0)}to{opacity:.95;transform:scale(1.08) rotate(2deg)}}
        @keyframes nxfb-ring{0%{transform:scale(.15);opacity:0}35%{opacity:1}100%{transform:scale(1.55);opacity:0}}
        @keyframes nxfb-logo{0%{opacity:0;transform:scale(.55);filter:blur(16px) brightness(1.6) drop-shadow(0 12px 60px rgba(120,60,220,.42))}55%{opacity:1;transform:scale(1.025);filter:blur(0) brightness(1.08) drop-shadow(0 12px 60px rgba(120,60,220,.42))}100%{opacity:1;transform:scale(1);filter:blur(0) brightness(1) drop-shadow(0 12px 60px rgba(120,60,220,.42))}}
        @keyframes nxfb-fade{from{opacity:0;transform:translateY(6px)}to{opacity:.55;transform:translateY(0)}}
      </style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
