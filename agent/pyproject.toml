[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "nexus"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.111",
    "uvicorn[standard]>=0.29",
    "pydantic>=2",
    "httpx>=0.27",
    "openai>=1.50",
    "anthropic>=0.40",
    "python-frontmatter>=1.1",
    "PyYAML>=6",
    "typer>=0.12",
    "rich>=13",
    "tomli_w",
    "prompt_toolkit",
    "psutil>=5.9",
    "websockets>=12.0",
    "cryptography>=42.0",
    "loom-framework",
]

[tool.uv.sources]
# Expects the loom repo to sit next to the nexus repo:
#   /some/path/loom
#   /some/path/nexus
# Clone both side-by-side and `uv sync` will pick loom up as an editable
# local install. Adjust if your layout differs.
loom-framework = { path = "../../loom", editable = true }

[project.optional-dependencies]
dev = [
    "ruff",
    "pytest",
    "pytest-asyncio",
]

[project.scripts]
nexus = "nexus.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["src/nexus"]

[tool.ruff]
line-length = 100

[tool.pytest.ini_options]
# Treat async def tests as asyncio by default so we don't have to
# sprinkle ``@pytest.mark.asyncio`` on every HITL test.
asyncio_mode = "auto"
